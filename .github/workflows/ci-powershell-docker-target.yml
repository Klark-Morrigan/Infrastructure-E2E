name: ci-powershell-docker-target

# Delegates to the shared Docker target CI workflow in Common-PowerShell.
# Tests run on the hosted runner and connect via SSH to a Docker container
# (the target). Kept as a local file so pull_request triggers work for this
# repo, and so other workflows can call it via workflow_call.
on:
  pull_request:
  workflow_call:
  workflow_dispatch:

jobs:
  ci-powershell-docker-target:
    uses: Klark-Morrigan/Common-PowerShell/.github/workflows/ci-powershell-docker-target.yml@master
