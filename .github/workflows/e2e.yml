# E2E test workflow.
#
# Triggers:
#   - workflow_dispatch: manual run from the GitHub UI or gh CLI
#   - workflow_call:     called by upstream repos as a required PR check
#
# The workflow creates a GitHub Deployment in Infrastructure-E2E and waits
# for the polling agent (agent/Start-E2EAgent.ps1) to post a terminal status.
# The actual test logic runs on the workstation - the only way to access Hyper-V.
#
# Authentication: github.token is scoped to the repo that triggered the workflow.
# When called via workflow_call from an upstream repo it cannot create deployments
# in Infrastructure-E2E. The GitHub App token is used instead - it has
# deployments:write on Infrastructure-E2E regardless of the calling context.

name: E2E

on:
  pull_request:
    branches: [ master ]
  workflow_dispatch:
  workflow_call:
    secrets:
      GH_APP_ID:
        required: true
      GH_APP_PRIVATE_KEY:
        required: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    # 35 minutes: covers the 30-minute poll window plus startup slack.
    timeout-minutes: 35

    steps:
      - name: Obtain GitHub App token (Infrastructure-E2E)
        id: token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: VitaliiAndreev
          repositories: Infrastructure-E2E

      - name: Create deployment
        id: create-deployment
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          # ref: use the current branch when triggered from within this repo
          # (pull_request, workflow_dispatch) so the deployment records the
          # branch under test. Use master when called via workflow_call from an
          # upstream repo - github.ref_name is the caller's branch in that case,
          # which is not a valid ref in this repo.
          # auto_merge:false - no branch merge is relevant here.
          # required_contexts:[] - bypasses commit-status checks that would
          # otherwise block deployment creation on a repo with branch protection.
          ref=${{ github.event_name == 'workflow_call' && 'master' || github.ref_name }}
          payload="{\"ref\":\"$ref\",\"environment\":\"e2e-workstation\",\"auto_merge\":false,\"required_contexts\":[]}"
          deployment_id=$(echo "$payload" | gh api \
            --method POST \
            "repos/VitaliiAndreev/Infrastructure-E2E/deployments" \
            --input - \
            --jq '.id')
          echo "deployment-id=$deployment_id" >> "$GITHUB_OUTPUT"
          echo "Created deployment $deployment_id"

      - name: Wait for terminal status
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          DEPLOYMENT_ID: ${{ steps.create-deployment.outputs.deployment-id }}
        run: |
          # Poll every 30 seconds for up to 30 minutes (60 attempts).
          # The polling agent on the workstation picks up the deployment,
          # runs the full test suite, then posts success or failure here.
          # GitHub returns statuses newest-first, so .[0] is the latest.
          max_polls=60
          timed_out=true

          for i in $(seq 1 $max_polls); do
            state=$(gh api \
              "repos/VitaliiAndreev/Infrastructure-E2E/deployments/$DEPLOYMENT_ID/statuses" \
              --jq '.[0].state // empty')

            echo "Poll $i/$max_polls: state=${state:-(none)}"

            case "$state" in
              success|failure|error|inactive)
                timed_out=false
                break
                ;;
            esac

            [ "$i" -lt "$max_polls" ] && sleep 30
          done

          if [ "$timed_out" = "true" ]; then
            echo "::error::Timed out after 30 minutes - polling agent did not post a terminal status."
            exit 1
          fi

          case "$state" in
            success)
              echo "E2E tests passed."
              ;;
            failure|error|inactive)
              echo "::error::E2E tests ended with status: $state"
              exit 1
              ;;
          esac
