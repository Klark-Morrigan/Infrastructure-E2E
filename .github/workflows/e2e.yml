# E2E test workflow.
#
# Triggers:
#   - workflow_dispatch: manual run from the GitHub UI or gh CLI
#   - workflow_call:     called by upstream repos as a required PR check
#
# The workflow creates a GitHub Deployment in Infrastructure-E2E and waits
# for the polling agent (agent/Start-E2EAgent.ps1) to post a terminal status.
# The actual test logic runs on the workstation - the only way to access Hyper-V.
#
# Authentication: github.token is scoped to the repo that triggered the workflow.
# When called via workflow_call from an upstream repo it cannot create deployments
# in Infrastructure-E2E. The GitHub App token is used instead - it has
# deployments:write on Infrastructure-E2E regardless of the calling context.

name: E2E

on:
  pull_request:
  workflow_dispatch:
    inputs:
      flow-spec:
        description: >-
          JSON selecting which create/remove implementation each layer runs,
          e.g. {"usersFlow":"ansible","runnersFlow":"ansible"}. Values are
          'ansible' or 'custom-powershell'. Omit for the ansible scenario.
        required: false
        type: string
        default: '{"usersFlow":"ansible","runnersFlow":"ansible"}'
  workflow_call:
    inputs:
      flow-spec:
        description: >-
          JSON selecting which create/remove implementation each layer runs.
          Callers pass {"usersFlow":"...","runnersFlow":"..."} with values
          'ansible' (default) or 'custom-powershell'. Omitted => ansible, so
          a caller that does not set it gets the default ansible scenario.
        required: false
        type: string
        default: '{"usersFlow":"ansible","runnersFlow":"ansible"}'
    secrets:
      GH_APP_ID:
        required: true
      GH_APP_PRIVATE_KEY:
        required: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    # 35 minutes: covers the 30-minute poll window plus startup slack.
    timeout-minutes: 35

    steps:
      - name: Obtain GitHub App token (Infrastructure-E2E)
        id: token
        uses: actions/create-github-app-token@v3
        with:
          # client-id accepts the App ID or its Client ID (both are valid
          # GitHub App JWT issuers); the GH_APP_ID secret supplies whichever
          # this App uses.
          client-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: Klark-Morrigan
          repositories: Infrastructure-E2E

      - name: Resolve deployment ref
        id: resolve-ref
        # github context values are passed through env, not inlined into the
        # script: head_ref is attacker-controllable on a fork PR, so inlining
        # it risks shell injection (GitHub secure-use guidance). The script
        # reads the shell vars instead.
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Cross-repo call: always deploy against master - the caller's branch
          # does not exist in this repo (detected via REPOSITORY).
          # pull_request (own repo): use the source branch - REF_NAME resolves
          # to the synthetic merge ref (e.g. 6/merge) which is not real.
          # workflow_dispatch: use the branch selected in the GitHub UI.
          #
          # When called from another repo via workflow_call, the github context
          # is inherited from the caller: EVENT_NAME stays "pull_request" and
          # HEAD_REF carries the caller's branch, which does not exist here.
          # Detect that case by checking the repository and fall back to master.
          if [ "$REPOSITORY" != "Klark-Morrigan/Infrastructure-E2E" ]; then
            ref="master"
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            ref="$HEAD_REF"
          else
            ref="$REF_NAME"
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "Deployment ref: $ref"

      - name: Create deployment
        id: create-deployment
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          # The calling repo selects which create/remove implementation each
          # layer runs via this flow-spec; it rides to the workstation agent
          # in the deployment payload. Empty for a pull_request on this repo
          # (inputs only exist for workflow_call / workflow_dispatch) - the
          # step defaults it to the ansible scenario below so own-repo PRs
          # still exercise the primary path.
          FLOW_SPEC: ${{ inputs.flow-spec }}
        run: |
          flow_spec="$FLOW_SPEC"
          if [ -z "$flow_spec" ]; then
            flow_spec='{"usersFlow":"ansible","runnersFlow":"ansible"}'
          fi
          ref=${{ steps.resolve-ref.outputs.ref }}
          # jq --argjson parses flow_spec as JSON and embeds it as the
          # deployment payload object; an invalid spec fails the step here
          # rather than silently reaching the agent. payload travels back to
          # the polling agent, which reads usersFlow / runnersFlow from it.
          # auto_merge:false - no branch merge is relevant here.
          # required_contexts:[] - bypasses commit-status checks that would
          # otherwise block deployment creation on a repo with branch protection.
          body=$(jq -nc \
            --arg ref "$ref" \
            --argjson payload "$flow_spec" \
            '{ ref: $ref, environment: "e2e-workstation",
               auto_merge: false, required_contexts: [],
               payload: $payload }')
          deployment_id=$(printf '%s' "$body" | gh api \
            --method POST \
            "repos/Klark-Morrigan/Infrastructure-E2E/deployments" \
            --input - \
            --jq '.id')
          echo "deployment-id=$deployment_id" >> "$GITHUB_OUTPUT"
          echo "Created deployment $deployment_id with flow spec: $flow_spec"

      - name: Wait for terminal status
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          DEPLOYMENT_ID: ${{ steps.create-deployment.outputs.deployment-id }}
        run: |
          # Poll every 30 seconds for up to 30 minutes (60 attempts).
          # The polling agent on the workstation picks up the deployment,
          # runs the full test suite, then posts success or failure here.
          # GitHub returns statuses newest-first, so .[0] is the latest.
          max_polls=60
          timed_out=true

          for i in $(seq 1 $max_polls); do
            state=$(gh api \
              "repos/Klark-Morrigan/Infrastructure-E2E/deployments/$DEPLOYMENT_ID/statuses" \
              --jq '.[0].state // empty')

            echo "Poll $i/$max_polls: state=${state:-(none)}"

            case "$state" in
              success|failure|error|inactive)
                timed_out=false
                break
                ;;
            esac

            [ "$i" -lt "$max_polls" ] && sleep 30
          done

          if [ "$timed_out" = "true" ]; then
            echo "::error::Timed out after 30 minutes - polling agent did not post a terminal status."
            exit 1
          fi

          case "$state" in
            success)
              echo "E2E tests passed."
              ;;
            failure|error|inactive)
              echo "::error::E2E tests ended with status: $state"
              exit 1
              ;;
          esac
