# CI for this repo's YAML surfaces. Delegates to the reusable workflow
# in Common-Automation, which runs three lint jobs in parallel:
# actionlint, action-validator, yamllint. Each job auto-skips when its
# target surface is absent, so a repo with no matching content still
# gets workflow/YAML linting at no extra cost.
name: Common-Automation

on:
  pull_request:
  workflow_dispatch:

jobs:
  ci-yaml:
    uses: Klark-Morrigan/Common-Automation/.github/workflows/ci-yaml.yml@master
